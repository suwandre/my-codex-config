default_permissions = "workspace"

model_personality = "pragmatic"
model = "gpt-5.5"
model_reasoning_effort = "medium"
[features]
unified_exec = true
shell_snapshot = true
apps = true
steer = true
personality = true
multi_agent = true
prevent_idle_sleep = true
js_repl = true

[sandbox_workspace_write]
network_access = true

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]

[mcp_servers.sequential-thinking]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]

[mcp_servers.qmd]
command = "qmd"
args = ["mcp"]

[mcp_servers.fff]
command = "fff-mcp"
args = []

[mcp_servers.fff.tools.find_files]
approval_mode = "approve"

[mcp_servers.fff.tools.grep]
approval_mode = "approve"

[mcp_servers.fff.tools.multi_grep]
approval_mode = "approve"

[notice.model_migrations]
"gpt-5.2-codex" = "gpt-5.3-codex"
"gpt-5.3-codex" = "gpt-5.4"

[tui]
status_line = ["model-with-reasoning", "context-remaining", "five-hour-limit", "context-used"]
theme = "kanagawa"

[tui.model_availability_nux]
"gpt-5.5" = 3

[plugins."github@openai-curated"]
enabled = true

[projects.'c:\users\suwan\desktop\coding stuff\own stuff\fluss']
trust_level = "trusted"

[permissions.workspace.filesystem]
":project_roots" = {
  "."                     = "write",
  "**/.env"               = "none",
  "**/.env.*"             = "none",
  "**/node_modules/**"    = "none",
  "**/dist/**"            = "none",
  "**/build/**"           = "none",
  "**/.next/**"           = "none",
  "**/coverage/**"        = "none",
  "**/__pycache__/**"     = "none",
  "**/*.log"              = "none",
  "**/*.pb.go"            = "none",
  "**/generated/**"       = "none",
  "**/*.gen.go"           = "none"
}
glob_scan_max_depth = 4

[windows]
