default_permissions = "workspace"
approval_policy = "never"
project_doc_fallback_filenames = ["SOUL.md"]

model_personality = "pragmatic"
model = "gpt-5.5"
model_reasoning_effort = "high"
[features]
unified_exec = true
shell_snapshot = true
apps = true
steer = true
personality = true
multi_agent = true
prevent_idle_sleep = true
js_repl = true

[sandbox_workspace_write]
network_access = true

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]

[mcp_servers.sequential-thinking]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"

[notice.model_migrations]
"gpt-5.2-codex" = "gpt-5.3-codex"
"gpt-5.3-codex" = "gpt-5.4"

[tui]
status_line = ["model-with-reasoning", "five-hour-limit", "context-used", "used-tokens", "total-input-tokens", "total-output-tokens"]
theme = "kanagawa"

[tui.model_availability_nux]
"gpt-5.5" = 4

[plugins."github@openai-curated"]
enabled = true

[plugins."browser-use@openai-bundled"]
enabled = true

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = true

[projects.'c:\users\suwan\desktop\coding stuff\own stuff\fluss']
trust_level = "trusted"

[projects.'c:\users\suwan\.codex']
trust_level = "trusted"

[projects.'c:\users\suwan\desktop\coding stuff\own stuff\rooted-on-rhea']
trust_level = "trusted"

[projects.'c:\users\suwan\desktop\coding stuff\own stuff\codex-metrics']
trust_level = "trusted"

[permissions.workspace.filesystem]
":project_roots" = {
  "."                     = "write",
  "**/.env"               = "none",
  "**/.env.*"             = "none",
  "**/node_modules/**"    = "none",
  "**/dist/**"            = "none",
  "**/build/**"           = "none",
  "**/.next/**"           = "none",
  "**/coverage/**"        = "none",
  "**/__pycache__/**"     = "none",
  "**/*.log"              = "none",
  "**/*.pb.go"            = "none",
  "**/generated/**"       = "none",
  "**/*.gen.go"           = "none"
}
glob_scan_max_depth = 4

